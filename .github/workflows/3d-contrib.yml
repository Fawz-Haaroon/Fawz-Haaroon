name: Generate 3D Contribution Graph

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  contrib-3d:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate 3D profile contributions
        uses: yoshi389111/github-profile-3d-contrib@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          USERNAME: Fawz-Haaroon
          SETTINGS_JSON: '{"filename": "assets/graphs/contributions-3d.svg", "theme": "night", "projection": "orthographic"}'

      - name: Commit 3D graph if changed
        run: |
          if git status --porcelain | grep "assets/graphs/contributions-3d.svg"; then
            git config user.name "profile-bot"
            git config user.email "profile-bot@users.noreply.github.com"
            git add assets/graphs/contributions-3d.svg
            git commit -m "chore: update 3D contributions graph" || true
            git push
          fi
